# Fly app for the MediaMTX relay (phone-push ingest for the live demo).
#
# Deploy:  cd relay && fly launch --no-deploy --copy-config --name safety-sentinel-relay
#          fly deploy
#
# The backend app (safety-sentinel-api) reaches this over Fly private networking
# at rtsp://safety-sentinel-relay.internal:8554/phone-demo — no public RTSP port
# is needed. Only the RTMP ingest (1935) is exposed publicly for the phone.
app = "safety-sentinel-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

# Public RTMP ingest — the phone (Larix Broadcaster) pushes here.
[[services]]
  protocol = "tcp"
  internal_port = 1935
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 1935

# NOTE: RTSP (8554) is intentionally NOT published here. The backend reads it
# over the private .internal network; validate it with the backend's
# POST /cameras/test-stream endpoint (which runs inside Fly), not from outside.

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
