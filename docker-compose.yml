# CCTV/RTSP emulation + Safety Sentinel backend.
#
# Three services on a private network so the backend reaches the RTSP feed
# INTERNALLY (rtsp://mediamtx:8554/...) — the stream is never publicly exposed,
# only the API on :8000 is. See DEMOSCRIPT.md and ARCHITECTURE.md.
#
#   1. mediamtx — the RTSP server (what plain `ffmpeg -f rtsp` was missing).
#   2. ffmpeg   — loops emulator/media/demo-worksite.mp4 into the RTSP server.
#   3. backend  — FastAPI + the continuous camera monitor.
#
# Usage:
#   ./emulator/make-sample-video.sh            # one-time: build the demo video
#   docker compose up --build
#   # register a camera at rtsp://mediamtx:8554/worksite-demo via the Cameras page
#
# NOTE: this stack must run on a persistent container host (Fly.io / Render /
# Railway / a VM), NOT Vercel — serverless cannot run the always-on monitor.

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      # Exposed only for local testing (ffprobe/VLC). In production you can drop
      # these — the backend reaches mediamtx over the private network.
      - "8554:8554" # RTSP
      - "8888:8888" # HLS (optional smoother live preview)
      # RTMP ingest. Required for a phone (Streamlabs/Larix) to PUSH a live feed
      # into the LOCAL relay — point the app at rtmp://<your-laptop-LAN-ip>:1935/
      # phone-demo. The bundled ffmpeg emulator doesn't need this (it pushes over
      # the internal network), so it was previously unexposed.
      - "1935:1935" # RTMP ingest (phone push)
    networks:
      - sentinel

  # One ffmpeg service per emulated camera feed. Each loops its own clip into a
  # distinct mediamtx path; the seeded cameras (cam-01/02/03) attach to these.
  # Build the clips first with ./emulator/make-sample-video.sh.
  # -re paces at realtime; -stream_loop -1 loops forever. -c:v copy passes the
  # stream through without re-encoding — near-zero CPU. Requires H.264 source.
  ffmpeg:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./emulator/media:/media:ro
    command: >
      -re -stream_loop -1 -i /media/demo-worksite.mp4
      -c:v copy -an -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/worksite-demo
    networks:
      - sentinel

  ffmpeg-dock:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./emulator/media:/media:ro
    command: >
      -re -stream_loop -1 -i /media/loading-dock.mp4
      -c:v copy -an -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/loading-dock
    networks:
      - sentinel

  ffmpeg-welding:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./emulator/media:/media:ro
    command: >
      -re -stream_loop -1 -i /media/welding-bay.mp4
      -c:v copy -an -f rtsp -rtsp_transport tcp
      rtsp://mediamtx:8554/welding-bay
    networks:
      - sentinel

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local
        required: false
    environment:
      # The emulated feeds, reachable on the private compose network.
      DEMO_RTSP_URL: rtsp://mediamtx:8554/worksite-demo
      # Base URL the seeded cameras attach their own paths to (loading-dock, etc.).
      DEMO_RTSP_BASE_URL: rtsp://mediamtx:8554
      # Auto-start monitoring on all seeded cameras so `docker compose up` lights
      # every feed without clicking Start in the UI.
      SEED_CAMERA_MONITORING: "true"
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"
      # API keys are loaded from .env.local via env_file above.
      # To override a key here, uncomment and set the value explicitly:
      # ROBOFLOW_API_KEY: ""
      # QWEN_API_KEY: ""
      # ANTHROPIC_API_KEY: ""
      EMULATOR_MEDIA_PATH: /emulator/media
    volumes:
      - backend-data:/data
      - ./emulator/media:/emulator/media:ro
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge

volumes:
  backend-data:
